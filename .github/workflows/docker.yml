name: publish-image

# Trigger: push a git tag like v0.1.0. Also support manual run from the Actions tab.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # GITHUB_TOKEN is auto-provided by GitHub; these permissions let it push
    # container images to the GitHub Container Registry (ghcr.io).
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Lowercase the owner name (GHCR requires lowercase); GitHub usernames may
      # contain uppercase. This step derives a lowercase image name.
      - name: Derive image name
        id: img
        run: echo "name=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/sy-automl-mcp" >> "$GITHUB_OUTPUT"

      - name: Build and push (tabular tier)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          # Tag both :<version> and :latest, plus a tabular-specific tag.
          tags: |
            ${{ steps.img.outputs.name }}:latest
            ${{ steps.img.outputs.name }}:${{ github.ref_name }}
            ${{ steps.img.outputs.name }}:tabular
          build-args: |
            TIER=tabular
          # Cache between runs to speed up rebuilds.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push (full tier, optional)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:full
          build-args: |
            TIER=full
          cache-from: type=gha
          cache-to: type=gha,mode=max
